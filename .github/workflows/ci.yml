name: CI

# Runs on every pull request and on pushes to the main branch. Configure branch
# protection (Settings -> Branches) to REQUIRE the "static" and "e2e" checks so
# merges are gated on green — the required-checks rule is a repo setting, not
# something a workflow file can enforce on its own.
on:
    pull_request:
    push:
        branches: [main, master]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    static:
        name: Lint & unit tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # --- PHP: CodeSniffer against the project ruleset (phpcs.xml.dist) ---
            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '7.4'
                  coding_standards: none
                  tools: composer

            - name: Install Composer dependencies
              run: composer install --prefer-dist --no-progress

            - name: PHP CodeSniffer
              run: composer lint:php

            # --- JavaScript: ESLint + Jest unit tests ---
            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 18
                  cache: npm

            - name: Install npm dependencies
              run: npm ci

            - name: Lint JS
              run: npm run lint:js

            - name: JS unit tests
              run: npm run test:js

    e2e:
        name: Build, PHPUnit & Playwright e2e
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 18
                  cache: npm

            - name: Install npm dependencies
              run: npm ci

            - name: Build production assets
              run: npm run build

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            - name: Start wp-env
              run: npm run env:start

            # PHPUnit runs inside wp-env's tests container (needs the WP test library).
            - name: PHP unit tests
              run: npm run test:php

            - name: Playwright e2e
              run: npm run test:e2e

            - name: Upload Playwright report
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

            - name: Stop wp-env
              if: always()
              run: npm run env:stop
